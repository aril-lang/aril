description = "Character-category histogram: count letters, digits, whitespace, and other in a CLI string argument"
source      = "ux-demand-study unicode"
category    = "stdlib-binding"
showcase    = false
forces      = []
since       = "0.1"
status      = "running"
expects     = "run-pass"
entry       = "char_histogram.aril"

# The implementation uses the unicode.isLetter / isDigit / isSpace bindings.
# All three test cases are pure ASCII, where unicode.Is* agrees with the
# Python oracle's str.isalpha/isdigit/isspace.

[[case]]
args            = ["Hello, World! 123"]
expected_output = "case1.txt"

[[case]]
args            = ["abc123  !?"]
expected_output = "case2.txt"

[[case]]
args            = ["The quick brown fox 42!"]
expected_output = "case3.txt"
