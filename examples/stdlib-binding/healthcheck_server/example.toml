description = "net/http server; an Aril type as http.Handler, with graceful shutdown"
source   = "services healthcheck_server"
category = "stdlib-binding"
showcase = true
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "healthcheck_server.aril"
expected_output = "expected-output.txt"

# E0219 — an Aril class declaring `implements http.Handler` must structurally
# provide `serveHTTP`; renaming it (so the method set no longer matches) is a
# conformance failure reported in Aril coordinates, not a raw `go build` "does
# not implement http.Handler" leak (D10, the first structural conformance check).
[[error]]
patch   = "errors/missing-serve-http.patch"
expect  = ["E0219"]
stage   = "sema"
matches = "errors/missing-serve-http.expected"
origin  = "synthetic"
