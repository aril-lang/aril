description = "RCU-synchronized ordered set over an immutable persistent BST: lock-free readers, copy-path CAS-publish writers over a generic atomic.Pointer<T> cell"
source   = "concurrency rcu_tree"
category = "concurrency"
showcase = true
forces   = []
since    = "0.16"
status   = "running"
expects  = "run-pass"
entry    = "rcu_tree.aril"

# Keys come from a deterministic LCG (see genKeys), so the inserted SET — and
# thus the final in-order traversal — is fixed regardless of thread
# interleaving. Each case varies the key-set size and the reader count.
[[case]]
args            = ["1", "16", "4"]
expected_output = "case1.txt"

[[case]]
args            = ["7", "64", "8"]
expected_output = "case2.txt"

[[case]]
args            = ["42", "256", "16"]
expected_output = "case3.txt"
