# CI-enforced floors for the corpus metrics.
#
# Checked by the corpus-status tool (`tools/corpus-status --check`, run in
# CI). CI is RED when:
#   * a measured metric drops below its floor here, or
#   * the measurement tooling itself fails (a patch won't apply, the
#     compiler crashes, a manifest can't be parsed).
# An individual imprecise/non-reproducing error message is NOT a red CI —
# it is a penalty on `diag_ok`, absorbed until the count crosses the floor.
#
# Adjusting the floors:
#   build_ok_min — STRICT ratchet. Only ever raised (a build regression is a
#     real breakage). Never lower it.
#   diag_ok_min  — relaxable, but ONLY in a commit that justifies why a
#     diagnostic legitimately regressed (e.g. a compiler refactor reworded a
#     message). Otherwise raise it as coverage grows.
#   run_ok_min   — STRICT ratchet, like build_ok: a run-pass example that
#     stops running (wrong output, crash, hang) is a real behavioural
#     regression. Only ever raised. --check re-derives run_ok, cache-
#     accelerated (unchanged examples hit; only changed ones re-run), so the
#     gate is fast and deterministic.

build_ok_min = 100  # current build_ok; strict ratchet (raised 99→100 in the
                    # NIL-SAFETY+DIAG-CLEANUP follow-on — graph_bfs, the live
                    # regression guard for the R1/R2 container fixes: T2 omitted
                    # Map field, bug#3 uninit List var, T13 bare Map<int,List>
                    # index miss→empty, bug#4 for/index/method over a container
                    # field); prior 98→99 in
                    # CONTAINER-MODEL — the list_demo example exercises the new
                    # List<T> reference container; prior 97→98 LANGUAGE-FIXES
                    # (option_result_map: Option.map / Result.map); 93→97 across
                    # ATOMICS-BINDING: lockfree_ring (scalar atomic.Int64),
                    # lockfree_stack (generic Treiber over atomic.Pointer<T>),
                    # rcu_skiplist + rcu_tree (RCU over atomic.Pointer<T>))
diag_ok_min  = 116  # headroom below current diag_ok (122/122) so an individual
                    # imprecise message is a penalty, not a red (raised 88→116 at
                    # the CORPUS-POLISH close — the E0112 humanizer closed the whole
                    # token-spelling backlog, diag_ok 98→121; ~5 slack for future
                    # negative fixtures that don't immediately hit their ideal)
run_ok_min   = 100  # current run_ok; strict ratchet (raised 99→100 in the
                    # NIL-SAFETY+DIAG-CLEANUP follow-on — graph_bfs runs, exercising
                    # the R1/R2 container fixes end-to-end); prior 98→99 in
                    # CONTAINER-MODEL — list_demo runs, exercising List<T> mutate-in-
                    # place / index / iterate; prior 97→98 LANGUAGE-FIXES
                    # (option_result_map runs); 93→97 across ATOMICS-BINDING: the four
                    # lock-free examples flip target-sketch→run-pass, invariants hold
                    # under --contracts=panic, all -race-clean)
