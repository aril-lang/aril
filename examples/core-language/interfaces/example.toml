description = "Interface conformance"
source   = "borgo interfaces"
category = "core-language"
showcase = false
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "interfaces.aril"

[[error]]
patch   = "errors/extra-arg-baz.patch"   # baz takes one argument, given two
expect  = ["E0202"]
stage   = "sema"
matches = "errors/extra-arg-baz.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/class-equality.patch"   # == on a class type; use refEq for identity
expect  = ["E0401"]
stage   = "sema"
matches = "errors/class-equality.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/dup-baz.patch"   # a second top-level declaration of baz
expect  = ["E0113"]
stage   = "sema"
matches = "errors/dup-baz.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/unknown-interface-member.patch"   # c.missing() — member absent from Composite (and its extends chain)
expect  = ["E0214"]
stage   = "sema"
matches = "errors/unknown-interface-member.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/method-arity.patch"   # f.foo() takes no args, called with one
expect  = ["E0202"]
stage   = "sema"
matches = "errors/method-arity.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/class-unknown-member.patch"   # b.nope() — member absent from class Bar
expect  = ["E0214"]
stage   = "sema"
matches = "errors/class-unknown-member.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/class-method-arity.patch"   # b.foo(9) — Bar.foo takes no args
expect  = ["E0202"]
stage   = "sema"
matches = "errors/class-method-arity.expected"
origin  = "synthetic"
