# The container-diagnostic fixes (R1/R2) as negative cases: each patch
# introduces one error into the base program, and the .expected sidecar is
# the ideal Aril-coordinate message (D10). These are the diag_ok side of the
# same surfaces the run program exercises positively.

[[error]]
patch   = "errors/unused-local.patch"       # a `let` nothing references (bug#1)
expect  = ["E0221"]
stage   = "sema"
matches = "errors/unused-local.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/block-redeclare.patch"    # same-block re-`let` (bug#2)
expect  = ["E0222"]
stage   = "sema"
matches = "errors/block-redeclare.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/omitted-class-field.patch" # omit a bare user-class field (T2 policy)
